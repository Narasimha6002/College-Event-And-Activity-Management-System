{% extends 'clu_layout.html' %}

{% block title %}Attendance Scanner{% endblock %}
{% block header_title %}QR Attendance Scanner{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="p-8 border-b border-slate-100 bg-slate-50/50">
            <h2 class="text-xl font-bold text-slate-900">Scan Student QR</h2>
            <p class="text-slate-500 text-sm mt-1">Select an event and scan student QR codes to mark attendance live.</p>
        </div>

        <div class="p-8">
            <!-- Event Selection -->
            <div class="mb-8">
                <label class="block text-sm font-bold text-slate-700 mb-2">Target Event</label>
                <select id="eventSelect" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="">Select an Approved Event</option>
                    {% for event in events %}
                    <option value="{{ event.id }}">{{ event.title }} ({{ event.event_date }})</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Scanner UI -->
            <div id="scanner-container" class="relative rounded-2xl overflow-hidden bg-slate-900 aspect-square mb-8 hidden border-4 border-slate-800">
                <div id="reader" class="w-full h-full"></div>
                <div class="absolute inset-0 pointer-events-none border-2 border-indigo-500/50 rounded-2xl m-8 flex items-center justify-center">
                     <div class="w-16 h-1 w-full bg-indigo-500/30 absolute animate-pulse"></div>
                </div>
            </div>

            <button id="startBtn" onclick="startScanner()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all flex items-center justify-center">
                <i class="fa-solid fa-camera mr-2"></i> Start Camera Scanner
            </button>

            <div id="status-log" class="mt-8 space-y-3">
                <!-- Scan results will appear here -->
            </div>
        </div>
    </div>
</div>

<!-- html5-qrcode library -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    let html5QrScanner = null;
    let isScanning = false;

    function startScanner() {
        const eventId = document.getElementById('eventSelect').value;
        if (!eventId) {
            alert('Please select an event first');
            return;
        }

        document.getElementById('scanner-container').classList.remove('hidden');
        document.getElementById('startBtn').classList.add('hidden');

        html5QrScanner = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrScanner.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            onScanFailure
        ).catch(err => {
            console.error(err);
            alert("Camera access failed: " + err);
        });
        
        isScanning = true;
    }

    function onScanSuccess(decodedText, decodedResult) {
        // Stop scanning temporarily to avoid multiple scans
        if (!isScanning) return;
        isScanning = false;

        const eventId = document.getElementById('eventSelect').value;
        
        // Visual feedback
        const container = document.getElementById('scanner-container');
        container.classList.add('border-emerald-500');
        setTimeout(() => container.classList.remove('border-emerald-500'), 1000);

        // Send to backend
        fetch("{{ url_for('clu.mark_attendance') }}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                qr_data: decodedText,
                event_id: eventId
            })
        })
        .then(response => response.json())
        .then(data => {
            const statusLog = document.getElementById('status-log');
            const entry = document.createElement('div');
            
            if (data.success) {
                entry.className = "p-4 bg-emerald-50 border border-emerald-100 rounded-xl flex items-center animate-bounce-in";
                entry.innerHTML = `
                    <div class="w-8 h-8 bg-emerald-500 text-white rounded-full flex items-center justify-center mr-3">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <div>
                        <p class="text-emerald-900 font-bold text-sm">${data.message}</p>
                        <p class="text-emerald-600 text-[10px] uppercase font-bold tracking-wider">${new Date().toLocaleTimeString()}</p>
                    </div>
                `;
                // Play success sound (optional)
            } else {
                entry.className = "p-4 bg-red-50 border border-red-100 rounded-xl flex items-center";
                entry.innerHTML = `
                    <div class="w-8 h-8 bg-red-500 text-white rounded-full flex items-center justify-center mr-3">
                        <i class="fa-solid fa-xmark"></i>
                    </div>
                    <div>
                        <p class="text-red-900 font-bold text-sm">${data.error}</p>
                        <p class="text-red-600 text-[10px] pb-1">${data.student_name || 'Invalid QR'}</p>
                    </div>
                `;
            }
            
            statusLog.insertBefore(entry, statusLog.firstChild);
            
            // Resume scanning after 2 seconds
            setTimeout(() => {
                isScanning = true;
            }, 2000);
        })
        .catch(error => {
            console.error('Error:', error);
            isScanning = true;
        });
    }

    function onScanFailure(error) {
        // Just ignore errors
    }

    window.onbeforeunload = function() {
        if (html5QrScanner) {
            html5QrScanner.stop();
        }
    };
</script>

<style>
    @keyframes bounce-in {
        0% { transform: scale(0.95); opacity: 0; }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); opacity: 1; }
    }
    .animate-bounce-in {
        animation: bounce-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #reader video {
        object-fit: cover !important;
    }
</style>
{% endblock %}
